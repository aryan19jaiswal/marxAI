spring:
  application:
    name: marxAI-server
  profiles:
    active: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  cors:
    # Comma-separated list of origins allowed to call the API (the Next.js dev server by default).
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
