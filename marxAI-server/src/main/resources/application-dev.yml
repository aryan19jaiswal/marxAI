spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/${POSTGRES_DB:marxai}
    username: ${POSTGRES_USER:marxai}
    password: ${POSTGRES_PASSWORD:marxai}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

minio:
  url: http://localhost:9000
  access-key: ${MINIO_ROOT_USER:marxai}
  secret-key: ${MINIO_ROOT_PASSWORD:marxai12345}
  bucket: marxai-documents

qdrant:
  host: localhost
  rest-port: 6333
  grpc-port: 6334
